# Alembic Configuration for Publisher Performance Portal

[alembic]
# Path to migration scripts (relative to this file)
script_location = %(here)s/db/migrations

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# Truncate long revision identifiers in file names
truncate_slug_length = 40

# Set to 'true' to run the environment during generation
revision_environment = false

# Set to 'true' to allow .pyc files to run migrations
sourceless = false

# Version path separator
version_path_separator = os

# Output encoding
output_encoding = utf-8

# Database URL (overridden by env.py from settings)
sqlalchemy.url = postgresql://localhost:5432/benchmark


[post_write_hooks]
# Hooks to run after generating new migrations

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
