repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
        exclude: '^after\.json$'
      - id: trailing-whitespace
        exclude: '^after\.json$'
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        exclude: '^(.*\.html|after\.json|lazer_symbols\.json|tools/vscode-extension/test/fixtures/unparseable\.json)$'
